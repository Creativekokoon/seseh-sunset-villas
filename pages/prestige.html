<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Prestige — Seseh Sunset Villas</title>
  <link rel="stylesheet" href="https://use.typekit.net/xkb5dqg.css">
  <link rel="stylesheet" href="../css/prestige.css">
</head>
<body>

  <div id="nav-root"></div>
  <script src="../js/nav.js"></script>

  <div class="page-intro"></div>
  <div class="cursor-tip" id="tip">Explorer</div>
  <div class="bg"></div>

  <div class="page">

    <div class="villa-title">Prestige</div>

    <!-- STATS -->
    <div class="stats">
      <div class="stats-inner">
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="3" width="14" height="14" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <div class="stat-val">90,8 <span class="stat-sm">m²</span></div>
          <div class="stat-lbl">Surface</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 22 16" fill="none">
            <rect x="1" y="5" width="20" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <rect x="1" y="8" width="6" height="7" rx="0.5" stroke="currentColor" stroke-width="1"/>
          </svg>
          <div class="stat-val">2</div>
          <div class="stat-lbl">Chambres</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 22 18" fill="none">
            <path d="M3 9H19Q21 9 21 11V14Q21 16 19 16H3Q1 16 1 14V11Q1 9 3 9Z" stroke="currentColor" stroke-width="1.2"/>
            <path d="M4 9V5Q4 3 6 3H7Q8 3 8 4V5" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <div class="stat-val">2</div>
          <div class="stat-lbl">Salles de bain</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.2"/>
            <text x="10" y="14" text-anchor="middle" font-family="Helvetica Neue,sans-serif" font-size="8" fill="currentColor">€</text>
          </svg>
          <div class="stat-val">260 000 €</div>
          <div class="stat-lbl">À partir de</div>
        </div>
      </div>
    </div>

    <!-- MAIN BLOCK: plan left | image right -->
    <div class="dark-block">

      <div class="plan-side">
        <div class="plan-inner">
          <div class="plan-top">
            <div class="plan-title-wrap">
              <div class="plan-title">Blueprint Interactif</div>
              <div class="plan-subtitle">Sélectionnez une pièce pour explorer</div>
            </div>
            <div class="floor-tabs">
              <button class="floor-tab active" onclick="setFloor(0,this)">RDC</button>
              <button class="floor-tab" onclick="setFloor(1,this)">Étage</button>
            </div>
          </div>

          <div class="plan-svg-wrap">
            <!-- RDC -->
            <svg id="f0" class="plan-svg" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="318" height="198" fill="none" stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
              <g class="pzone selected" onclick="pick('living',this)">
                <rect class="pz-fill" x="1" y="1" width="212" height="152"/>
                <text x="106" y="72" text-anchor="middle" class="pz-text">Living</text>
                <text x="106" y="90" text-anchor="middle" class="pz-text">Cuisine</text>
              </g>
              <g class="pzone pool" onclick="pick('pool',this)">
                <rect class="pz-fill" x="213" y="1" width="106" height="152"/>
                <text x="266" y="84" text-anchor="middle" class="pz-text">Piscine</text>
              </g>
              <line x1="1" y1="153" x2="319" y2="153" stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
              <g class="pzone terrace" onclick="pick('terrace',this)">
                <rect class="pz-fill" x="1" y="153" width="318" height="46"/>
                <text x="160" y="183" text-anchor="middle" class="pz-text">Terrasse</text>
              </g>
            </svg>

            <!-- Étage -->
            <svg id="f1" class="plan-svg" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" style="display:none">
              <rect x="1" y="1" width="318" height="198" fill="none" stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
              <g class="pzone bedroom1" onclick="pick('bedroom1',this)">
                <rect class="pz-fill" x="1" y="1" width="158" height="142"/>
                <text x="80" y="82" text-anchor="middle" class="pz-text">Chambre 1</text>
              </g>
              <g class="pzone bedroom2" onclick="pick('bedroom2',this)">
                <rect class="pz-fill" x="159" y="1" width="160" height="142"/>
                <text x="239" y="82" text-anchor="middle" class="pz-text">Chambre 2</text>
              </g>
              <line x1="1" y1="143" x2="319" y2="143" stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
              <g class="pzone bath1" onclick="pick('bath1',this)">
                <rect class="pz-fill" x="1" y="143" width="106" height="56"/>
                <text x="54" y="177" text-anchor="middle" class="pz-text">Bain 1</text>
              </g>
              <g class="pzone bath2" onclick="pick('bath2',this)">
                <rect class="pz-fill" x="107" y="143" width="100" height="56"/>
                <text x="157" y="177" text-anchor="middle" class="pz-text">Bain 2</text>
              </g>
              <g class="pzone balcony" onclick="pick('balcony',this)">
                <rect class="pz-fill" x="207" y="143" width="112" height="56"/>
                <text x="263" y="177" text-anchor="middle" class="pz-text">Balcon</text>
              </g>
            </svg>
          </div>
        </div>
      </div>

      <!-- RIGHT: SVG room illustrations -->
      <div class="info-side">
        <div class="room-image empty" id="roomImg">

          <div class="room-visual" id="visual-living">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#e5dfd4"/><stop offset="55%" stop-color="#cfc6b9"/><stop offset="100%" stop-color="#b5ab9d"/>
                </linearGradient></defs>
                <rect width="800" height="600" fill="url(#lg1)"/>
                <rect y="390" width="800" height="210" fill="#b8aea2"/>
                <rect x="65" y="90" width="260" height="180" fill="#f4efe8" opacity="0.9"/>
                <rect x="470" y="115" width="240" height="220" fill="#9d9488" opacity="0.92"/>
                <rect x="155" y="425" width="250" height="70" fill="#d9cfc1"/>
                <rect x="475" y="400" width="165" height="95" fill="#b8aea2"/>
                <rect x="500" y="225" width="135" height="16" fill="#cec4b8"/>
                <rect x="90" y="310" width="190" height="20" fill="#c9bfb3"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-pool">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <defs>
                  <linearGradient id="poolBg" x1="0" y1="0" x2="0.9" y2="1"><stop offset="0%" stop-color="#ded7cb"/><stop offset="100%" stop-color="#b7aea2"/></linearGradient>
                  <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d2dbdc"/><stop offset="55%" stop-color="#b3c0c2"/><stop offset="100%" stop-color="#96a4a8"/></linearGradient>
                </defs>
                <rect width="800" height="600" fill="url(#poolBg)"/>
                <polygon points="95,150 705,120 640,470 155,505" fill="url(#waterGrad)"/>
                <polygon points="95,150 705,120 665,150 130,178" fill="#e3dacc"/>
                <rect x="530" y="72" width="145" height="35" fill="#c2b8ab" opacity="0.9"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-terrace">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <defs><linearGradient id="terSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f3eee7"/><stop offset="100%" stop-color="#cbc0b2"/></linearGradient></defs>
                <rect width="800" height="600" fill="#d0c6ba"/>
                <rect width="800" height="310" fill="url(#terSky)" opacity="0.96"/>
                <rect y="310" width="800" height="290" fill="#b2a89c"/>
                <rect x="85" y="385" width="630" height="125" fill="#d6cabd"/>
                <rect x="210" y="332" width="130" height="45" fill="#b7aca0"/>
                <rect x="468" y="332" width="130" height="45" fill="#b7aca0"/>
                <rect x="255" y="360" width="40" height="70" fill="#978d82"/>
                <rect x="513" y="360" width="40" height="70" fill="#978d82"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-bedroom1">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#d8cfc3"/>
                <rect y="355" width="800" height="245" fill="#b3a89c"/>
                <rect x="180" y="260" width="435" height="150" fill="#eee7dc"/>
                <rect x="205" y="220" width="385" height="65" fill="#c1b6a9"/>
                <rect x="235" y="285" width="145" height="52" fill="#f6f1ea"/>
                <rect x="420" y="285" width="145" height="52" fill="#f0e9df"/>
                <rect x="650" y="140" width="75" height="165" fill="#9d9488"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-bedroom2">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#d4cabc"/>
                <rect y="350" width="800" height="250" fill="#b0a598"/>
                <rect x="160" y="250" width="470" height="155" fill="#ece3d7"/>
                <rect x="195" y="208" width="400" height="60" fill="#c0b4a7"/>
                <rect x="220" y="276" width="165" height="55" fill="#f5efe8"/>
                <rect x="410" y="276" width="165" height="55" fill="#ebe3d8"/>
                <rect x="78" y="170" width="125" height="205" fill="#a1978b"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-bath1">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#dbd4ca"/>
                <rect y="335" width="800" height="265" fill="#b8aea2"/>
                <rect x="120" y="190" width="560" height="240" fill="#f5f0e9"/>
                <rect x="170" y="140" width="180" height="35" fill="#cac0b4"/>
                <rect x="470" y="135" width="115" height="140" fill="#a89f93"/>
                <circle cx="250" cy="310" r="18" fill="#d8cec2"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-bath2">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#d8d1c7"/>
                <rect y="332" width="800" height="268" fill="#b5ab9f"/>
                <rect x="160" y="170" width="480" height="255" fill="#f3eee8"/>
                <rect x="535" y="140" width="90" height="180" fill="#a39a8e"/>
                <rect x="180" y="135" width="200" height="30" fill="#cbc0b5"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-balcony">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <defs><linearGradient id="balSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f4efe8"/><stop offset="100%" stop-color="#cec3b6"/></linearGradient></defs>
                <rect width="800" height="600" fill="#d2c8bc"/>
                <rect width="800" height="300" fill="url(#balSky)"/>
                <rect y="300" width="800" height="300" fill="#b2a89c"/>
                <rect x="95" y="295" width="610" height="20" fill="#ddd2c5"/>
                <rect x="115" y="315" width="12" height="145" fill="#beb2a6"/>
                <rect x="245" y="315" width="12" height="145" fill="#beb2a6"/>
                <rect x="375" y="315" width="12" height="145" fill="#beb2a6"/>
                <rect x="505" y="315" width="12" height="145" fill="#beb2a6"/>
                <rect x="635" y="315" width="12" height="145" fill="#beb2a6"/>
              </svg>
            </div></div>
          </div>

        </div>
      </div>

    </div><!-- /dark-block -->

    <div class="prereserver-wrap">
      <a class="prereserver-btn" href="#">Pré-réserver</a>
    </div>

  </div><!-- /page -->

  <script src="../js/prestige.js"></script>
</body>
</html>
