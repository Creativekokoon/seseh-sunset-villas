<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Prestige — Seseh Sunset Villas</title>
  <link rel="stylesheet" href="https://use.typekit.net/xkb5dqg.css">
  <link rel="stylesheet" href="../css/prestige.css">
</head>
<body>

  <div class="page-intro"></div>
  <div class="cursor-label" id="cursorLabel">Explorer</div>

  <header class="topbar">
    <a class="back-btn" href="villas.html" id="backBtn">← Les Villas</a>
    <div class="topbar-brand">Seseh Sunset Villas</div>
    <button class="menu-btn" id="menuBtn">Menu</button>
  </header>

  <div class="layout">

    <!-- COL 1 — minimal info -->
    <aside class="col-details">
      <div class="villa-label">Type 02</div>
      <h1 class="villa-title">Prestige</h1>

      <div class="divider"></div>

      <div class="stats-col">
        <div class="stat-item">
          <div class="stat-val">90,8 <span class="stat-unit">m²</span></div>
          <div class="stat-label">Surface</div>
        </div>
        <div class="stat-item">
          <div class="stat-val">2</div>
          <div class="stat-label">Chambres</div>
        </div>
        <div class="stat-item">
          <div class="stat-val">2</div>
          <div class="stat-label">Salles de bain</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="price-block">
        <div class="price-from">à partir de</div>
        <div class="price-num">260 000 €</div>
      </div>

      <a class="cta-btn" href="#">Pré-réserver</a>
    </aside>

    <!-- COL 2 — image changes on room click -->
    <div class="col-image">
      <div class="image-placeholder" id="imgPlaceholder">
        <div class="placeholder-arrow">→</div>
        <div class="placeholder-hint">Sélectionnez<br>une pièce</div>
      </div>
      <div class="room-image" id="roomImage"></div>
      <div class="room-overlay" id="roomOverlay">
        <div class="room-overlay-name" id="roName"></div>
        <div class="room-overlay-tags" id="roTags"></div>
      </div>
    </div>

    <!-- COL 3 — floor plan, large -->
    <div class="col-plan">
      <div class="plan-header">
        <div class="plan-title">Plan Interactif</div>
        <div class="plan-tabs">
          <button class="plan-tab active" onclick="setFloor(0,this)">RDC</button>
          <button class="plan-tab" onclick="setFloor(1,this)">Étage</button>
        </div>
      </div>

      <div class="plan-svg-wrap">

        <!-- ── GROUND FLOOR ──
             Based on uploaded plan:
             Large main zone (39.54m²) = Living + Kitchen
             Bottom strip = Terrace (5.75m²)
             Right side = Pool
        -->
        <svg id="floor-0" viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

          <!-- Outer dashed boundary -->
          <rect x="2" y="2" width="336" height="256" fill="none"
            stroke="#C04040" stroke-width="1.5" stroke-dasharray="7 4" rx="0"/>

          <!-- LIVING + KITCHEN (top large zone) -->
          <g class="plan-zone" data-room="living" onclick="selectRoom('living',this)">
            <rect class="zone-fill" x="2" y="2" width="240" height="190"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
          </g>

          <!-- POOL (right zone, full height) -->
          <g class="plan-zone" data-room="pool" onclick="selectRoom('pool',this)">
            <rect class="zone-fill" x="242" y="2" width="96" height="190"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
            <!-- Pool shape inside -->
            <rect x="256" y="18" width="68" height="90" rx="6"
              fill="#D8EAF0" stroke="#9ABBC4" stroke-width="0.8"/>
          </g>

          <!-- Horizontal divider above terrace -->
          <line x1="2" y1="192" x2="338" y2="192" stroke="#B8B0A8" stroke-width="0.8"/>

          <!-- TERRACE (bottom strip) -->
          <g class="plan-zone" data-room="terrace" onclick="selectRoom('terrace',this)">
            <rect class="zone-fill" x="2" y="192" width="336" height="66"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
            <!-- Wood deck lines -->
            <line x1="2" y1="206" x2="338" y2="206" stroke="#D8D0C8" stroke-width="0.5"/>
            <line x1="2" y1="220" x2="338" y2="220" stroke="#D8D0C8" stroke-width="0.5"/>
            <line x1="2" y1="234" x2="338" y2="234" stroke="#D8D0C8" stroke-width="0.5"/>
            <line x1="2" y1="248" x2="338" y2="248" stroke="#D8D0C8" stroke-width="0.5"/>
          </g>

        </svg>

        <!-- ── FIRST FLOOR ──
             2 bedrooms, 2 bathrooms, balcony
        -->
        <svg id="floor-1" viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="display:none">

          <rect x="2" y="2" width="336" height="256" fill="none"
            stroke="#C04040" stroke-width="1.5" stroke-dasharray="7 4" rx="0"/>

          <!-- BEDROOM 1 (left, larger) -->
          <g class="plan-zone" data-room="bedroom1" onclick="selectRoom('bedroom1',this)">
            <rect class="zone-fill" x="2" y="2" width="168" height="180"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
            <!-- Bed icon -->
            <rect x="48" y="28" width="80" height="56" rx="2"
              fill="#EDE8E2" stroke="#C8C0B8" stroke-width="0.6"/>
            <rect x="48" y="28" width="80" height="12" rx="1"
              fill="#E0D8D0" stroke="#C8C0B8" stroke-width="0.4"/>
            <rect x="55" y="31" width="28" height="6" rx="1" fill="#D4CEC8"/>
            <rect x="93" y="31" width="28" height="6" rx="1" fill="#D4CEC8"/>
          </g>

          <!-- BEDROOM 2 (right) -->
          <g class="plan-zone" data-room="bedroom2" onclick="selectRoom('bedroom2',this)">
            <rect class="zone-fill" x="170" y="2" width="168" height="180"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
            <!-- Bed icon -->
            <rect x="210" y="28" width="72" height="50" rx="2"
              fill="#EDE8E2" stroke="#C8C0B8" stroke-width="0.6"/>
            <rect x="210" y="28" width="72" height="11" rx="1"
              fill="#E0D8D0" stroke="#C8C0B8" stroke-width="0.4"/>
            <rect x="217" y="31" width="24" height="5" rx="1" fill="#D4CEC8"/>
            <rect x="251" y="31" width="24" height="5" rx="1" fill="#D4CEC8"/>
          </g>

          <!-- Horizontal divider -->
          <line x1="2" y1="182" x2="338" y2="182" stroke="#B8B0A8" stroke-width="0.8"/>

          <!-- BATHROOM 1 (bottom left) -->
          <g class="plan-zone" data-room="bath1" onclick="selectRoom('bath1',this)">
            <rect class="zone-fill" x="2" y="182" width="120" height="76"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
            <!-- Bath tub -->
            <rect x="12" y="196" width="48" height="32" rx="5"
              fill="#E0E8F0" stroke="#B0C0CC" stroke-width="0.7"/>
          </g>

          <!-- BATHROOM 2 -->
          <g class="plan-zone" data-room="bath2" onclick="selectRoom('bath2',this)">
            <rect class="zone-fill" x="122" y="182" width="100" height="76"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
            <!-- Shower -->
            <rect x="134" y="196" width="36" height="36" rx="2"
              fill="#E0E8F0" stroke="#B0C0CC" stroke-width="0.7"/>
          </g>

          <!-- BALCONY (bottom right) -->
          <g class="plan-zone" data-room="balcony" onclick="selectRoom('balcony',this)">
            <rect class="zone-fill" x="222" y="182" width="116" height="76"
              fill="white" stroke="#B8B0A8" stroke-width="0.8"/>
            <!-- Balcony railing hint -->
            <rect x="230" y="190" width="100" height="4" rx="1"
              fill="#E0D8D0" stroke="#C8C0B8" stroke-width="0.5"/>
            <!-- Stairs void (bottom left on plan image) -->
            <rect x="222" y="218" width="42" height="40"
              fill="#F0EBE5" stroke="#C8C0B8" stroke-width="0.6"/>
          </g>

        </svg>
      </div>
    </div>

  </div>

  <!-- Drawer -->
  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-top">
      <div class="drawer-title">Seseh</div>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <nav class="drawer-nav">
      <a class="drawer-link" href="../index.html">Accueil <span class="dl-arrow">→</span></a>
      <a class="drawer-link" href="villas.html">Explorer les villas <span class="dl-arrow">→</span></a>
      <a class="drawer-link" href="#">Explorer Bali <span class="dl-arrow">→</span></a>
      <a class="drawer-link" href="#">Pré-réserver <span class="dl-arrow">→</span></a>
    </nav>
    <div class="drawer-footer">© 2026 Sora Immobilier · sora-immobilier.fr</div>
  </aside>

  <script src="../js/prestige.js"></script>
</body>
</html>
