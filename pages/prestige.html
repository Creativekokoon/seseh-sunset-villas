<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Prestige — Seseh Sunset Villas</title>
  <link rel="stylesheet" href="https://use.typekit.net/xkb5dqg.css">
  <link rel="stylesheet" href="../css/prestige.css">
</head>
<body>
  <div id="nav-root"></div>
  <script src="../js/nav.js"></script>


  <div class="page-intro"></div>
  <div class="cursor-tip" id="cursorTip">Explorer</div>

  <!-- BG -->
  <div class="bg"></div>

  <!-- Topbar -->

  <!-- PAGE BODY -->
  <div class="page-body">

    <!-- ── LEFT COLUMN ── -->
    <div class="col-left">

      <!-- Villa name -->
      <div class="villa-header">
        <div class="villa-type">Type 02</div>
        <div class="villa-name">Prestige</div>
      </div>

      <!-- Stats block — floated, not touching nav -->
      <div class="stats-block">
        <div class="stats-inner">
          <div class="stat-item">
            <!-- Square icon -->
            <svg class="stat-icon" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="3" width="14" height="14" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <div class="stat-val">90,8 <span class="stat-unit">m²</span></div>
            <div class="stat-label">Surface</div>
          </div>
          <div class="stat-sep"></div>
          <div class="stat-item">
            <!-- Bed icon -->
            <svg class="stat-icon" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="8" width="16" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/>
              <rect x="2" y="11" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1"/>
              <line x1="2" y1="16" x2="2" y2="18" stroke="currentColor" stroke-width="1.2"/>
              <line x1="18" y1="16" x2="18" y2="18" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <div class="stat-val">2</div>
            <div class="stat-label">Chambres</div>
          </div>
          <div class="stat-sep"></div>
          <div class="stat-item">
            <!-- Bath icon -->
            <svg class="stat-icon" viewBox="0 0 20 20" fill="none">
              <path d="M4 10 H17 Q18 10 18 11 V14 Q18 16 16 16 H4 Q2 16 2 14 V11 Q2 10 4 10Z" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5 10 V6 Q5 4 7 4 H8 Q9 4 9 5 V6" stroke="currentColor" stroke-width="1.2"/>
              <line x1="5" y1="16" x2="4" y2="18" stroke="currentColor" stroke-width="1.2"/>
              <line x1="15" y1="16" x2="16" y2="18" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <div class="stat-val">2</div>
            <div class="stat-label">Salles de bain</div>
          </div>
        </div>
      </div>

      <!-- Image zone — permanent, changes on room click -->
      <div class="room-image-wrap">
        <div class="room-image" id="roomImage">
          <div class="room-image-placeholder" id="imgPlaceholder">
            <span>Sélectionnez une pièce →</span>
          </div>
        </div>
      </div>

      <!-- Pre-reserver -->
      <a class="prereserver-btn" href="#">Pré-réserver</a>

    </div>

    <!-- ── RIGHT COLUMN ── -->
    <div class="col-right">

      <!-- Plan label + floor selector -->
      <div class="plan-header">
        <div class="plan-label">Plan Interactif — Sélectionner une pièce pour explorer</div>
        <div class="floor-tabs">
          <button class="floor-tab active" onclick="setFloor(0,this)">Rez-de-chaussée</button>
          <button class="floor-tab" onclick="setFloor(1,this)">1er Étage</button>
        </div>
      </div>

      <!-- RDC -->
      <svg id="floor-0" class="plan-svg" viewBox="0 0 360 230" xmlns="http://www.w3.org/2000/svg">

        <!-- Living + Kitchen -->
        <g class="pzone" onclick="selectRoom('living',this)">
          <rect class="pz-fill" x="1" y="1" width="240" height="172"/>
          <text x="120" y="82" text-anchor="middle" class="pz-text">Living</text>
          <text x="120" y="100" text-anchor="middle" class="pz-text">Cuisine</text>
        </g>

        <!-- Pool -->
        <g class="pzone" onclick="selectRoom('pool',this)">
          <rect class="pz-fill" x="241" y="1" width="118" height="172"/>
          <text x="300" y="90" text-anchor="middle" class="pz-text">Piscine</text>
        </g>

        <!-- Terrace — bottom strip -->
        <g class="pzone" onclick="selectRoom('terrace',this)">
          <rect class="pz-fill" x="1" y="173" width="358" height="56"/>
          <text x="180" y="207" text-anchor="middle" class="pz-text">Terrasse</text>
        </g>

      </svg>

      <!-- 1er Étage -->
      <svg id="floor-1" class="plan-svg" viewBox="0 0 360 230" xmlns="http://www.w3.org/2000/svg" style="display:none">

        <!-- Bedroom 1 -->
        <g class="pzone" onclick="selectRoom('bedroom1',this)">
          <rect class="pz-fill" x="1" y="1" width="178" height="162"/>
          <text x="90" y="88" text-anchor="middle" class="pz-text">Chambre 1</text>
        </g>

        <!-- Bedroom 2 -->
        <g class="pzone" onclick="selectRoom('bedroom2',this)">
          <rect class="pz-fill" x="179" y="1" width="180" height="162"/>
          <text x="269" y="88" text-anchor="middle" class="pz-text">Chambre 2</text>
        </g>

        <!-- Bathroom 1 -->
        <g class="pzone" onclick="selectRoom('bath1',this)">
          <rect class="pz-fill" x="1" y="163" width="120" height="66"/>
          <text x="61" y="200" text-anchor="middle" class="pz-text">Salle de Bain 1</text>
        </g>

        <!-- Bathroom 2 -->
        <g class="pzone" onclick="selectRoom('bath2',this)">
          <rect class="pz-fill" x="121" y="163" width="110" height="66"/>
          <text x="176" y="200" text-anchor="middle" class="pz-text">Salle de Bain 2</text>
        </g>

        <!-- Balcony -->
        <g class="pzone" onclick="selectRoom('balcony',this)">
          <rect class="pz-fill" x="231" y="163" width="128" height="66"/>
          <text x="295" y="200" text-anchor="middle" class="pz-text">Balcon</text>
        </g>

      </svg>

      <!-- Pre-réserver always visible below plan -->
      <a class="prereserver-btn" href="#">Pré-réserver</a>

    </div>

  </div><!-- /page-body -->

  <!-- Drawer -->

  <script src="../js/prestige.js"></script>
</body>
</html>
