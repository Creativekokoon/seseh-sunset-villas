<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Vivre à Seseh — Seseh Sunset Villas</title>
  <link rel="stylesheet" href="https://use.typekit.net/xkb5dqg.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    :root{
      --serif:'the-seasons',Georgia,serif;
      --sans:'Inter','Helvetica Neue',Arial,sans-serif;
      --gold:#c8a86a;
      --cream:#E8E4DC;
      --anthracite:#1a1a1a;
    }

    html,body{
      width:100%;height:100%;overflow:hidden;
      background:var(--cream);
      -webkit-font-smoothing:antialiased;
      font-family:var(--sans);
    }

    /* ── PAGE INTRO ── */
    .page-intro{position:fixed;inset:0;z-index:850;background:#242220;display:flex;align-items:center;justify-content:center;animation:introFadeOut 0.4s 0.9s ease forwards;pointer-events:none}
    .intro-logo{height:96px;width:auto;opacity:0;transform:scale(0.88);animation:introLogoIn 0.5s 0.1s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
    @keyframes introLogoIn{to{opacity:1;transform:scale(1)}}
    @keyframes introFadeOut{to{opacity:0}}

    /* ── LAYOUT ── */
    .layout{
      position:fixed;
      top:64px;left:0;right:0;bottom:0;
      display:grid;
      grid-template-columns:62fr 38fr;
    }

    /* ── MAP FRAME ── */
    .map-frame{
      position:relative;
      overflow:hidden;
      background:#0a0a0a;
      width:100%;
      height:100%;
    }
    .map-frame picture{
      position:absolute;inset:0;
      width:100%;height:100%;
      display:block;
    }
    .map-frame picture img{
      width:100%;height:100%;
      object-fit:cover;
      display:block;
    }
    .map-overlay-top,
    .map-overlay-bottom{
      position:absolute;left:0;right:0;
      pointer-events:none;
      z-index:2;
    }
    .map-overlay-top{
      top:0;height:24%;
      background:linear-gradient(to bottom,rgba(10,8,6,0.5),transparent);
    }
    .map-overlay-bottom{
      bottom:0;height:28%;
      background:linear-gradient(to top,rgba(10,8,6,0.5),transparent);
    }

    /* ── POI MARKER (label + line + dot) ── */
    .poi{
      position:absolute;
      transform:translate(-50%,-100%);
      display:flex;flex-direction:column;align-items:center;
      cursor:pointer;
      z-index:5;
      background:none;border:none;padding:0;
      font-family:inherit;
    }
    .poi:focus-visible{outline:none}
    .poi:focus-visible .poi-label{box-shadow:0 0 0 2px var(--gold)}
    .poi-label{
      background:rgba(20,18,14,0.88);
      border:0.5px solid rgba(201,168,106,0.45);
      color:rgba(255,252,248,0.96);
      font-family:var(--sans);
      font-size:0.66rem;font-weight:500;
      letter-spacing:0.1em;text-transform:uppercase;
      padding:6px 11px;
      white-space:nowrap;
      transition:background 0.25s ease,color 0.25s ease,border-color 0.25s ease;
    }
    .poi:hover .poi-label{
      background:rgba(20,18,14,0.96);
      border-color:var(--gold);
    }
    .poi-line{
      width:1px;
      height:var(--line-h,50px);
      background:rgba(255,255,255,0.85);
      transition:background 0.25s ease,width 0.25s ease;
    }
    .poi-dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 0 2px rgba(201,168,106,0.18),0 1px 4px rgba(0,0,0,0.4);
      transition:transform 0.25s ease,background 0.25s ease,box-shadow 0.25s ease;
    }

    /* Featured (Seseh Sunset Villas) */
    .poi--featured .poi-label{
      background:rgba(201,168,106,0.95);
      color:#1a1208;
      font-weight:600;
      border-color:rgba(255,255,255,0.4);
    }

    /* Active POI */
    .poi.active .poi-label{
      background:rgba(201,168,106,0.98);
      color:#1a1208;
      font-weight:600;
      border-color:rgba(255,255,255,0.5);
    }
    .poi.active .poi-line{
      background:var(--gold);
      width:1.5px;
    }
    .poi.active .poi-dot{
      transform:scale(1.4);
      background:#fff;
      box-shadow:0 0 0 3px rgba(201,168,106,0.55),0 1px 6px rgba(0,0,0,0.5);
    }

    /* ── POPUP ── */
    .poi-popup{
      position:absolute;
      width:240px;
      background:rgba(15,15,15,0.97);
      border:1px solid rgba(201,168,106,0.5);
      border-radius:8px;
      color:rgba(255,252,248,0.92);
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
      z-index:10;
      opacity:0;
      transform:translateY(8px);
      transition:opacity 0.28s ease,transform 0.28s ease;
      pointer-events:none;
      overflow:hidden;
      /* default: right of POI, vertical centre */
      left:calc(100% + 14px);
      top:50%;
      transform:translateY(calc(-50% + 8px));
    }
    .poi-popup.visible{
      opacity:1;
      transform:translateY(-50%);
      pointer-events:auto;
    }
    /* Variant: popup to left */
    .poi.popup-left .poi-popup{
      left:auto;
      right:calc(100% + 14px);
    }
    /* Variant: popup below */
    .poi.popup-below .poi-popup{
      top:calc(100% + 14px);
      transform:translateY(8px);
    }
    .poi.popup-below .poi-popup.visible{
      transform:translateY(0);
    }
    /* Variant: popup above */
    .poi.popup-above .poi-popup{
      top:auto;
      bottom:calc(100% + 14px);
      transform:translateY(-8px);
    }
    .poi.popup-above .poi-popup.visible{
      transform:translateY(0);
    }

    .poi-popup-img{
      width:100%;height:130px;
      object-fit:cover;
      display:block;
    }
    .poi-popup-body{padding:14px 16px 16px}
    .poi-popup-title{
      font-family:var(--serif);
      font-size:1.05rem;font-weight:500;
      letter-spacing:0.04em;text-transform:uppercase;
      color:var(--gold);
      margin-bottom:6px;
    }
    .poi-popup-desc{
      font-family:var(--sans);
      font-size:0.72rem;line-height:1.5;
      color:rgba(255,252,248,0.7);
      margin-bottom:10px;
    }
    .poi-popup-dist{
      font-family:var(--sans);
      font-size:0.6rem;font-weight:500;
      letter-spacing:0.18em;text-transform:uppercase;
      color:var(--gold);
    }
    .poi-popup-close{
      position:absolute;
      top:6px;right:6px;
      background:rgba(0,0,0,0.4);
      border:none;
      width:26px;height:26px;border-radius:50%;
      color:rgba(255,252,248,0.85);
      font-size:1rem;line-height:1;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      z-index:2;
      transition:background 0.2s,color 0.2s;
    }
    .poi-popup-close:hover{background:rgba(0,0,0,0.7);color:#fff}

    /* ── PANEL (sidebar) ── */
    .panel{
      background:var(--cream);
      border-left:1px solid rgba(36,32,28,0.1);
      display:flex;flex-direction:column;
      overflow:hidden;
      height:100%;
    }
    .panel-title{
      font-family:var(--serif);
      font-size:2.4rem;font-weight:500;
      letter-spacing:0.11em;text-transform:uppercase;
      color:rgba(52,48,44,0.92);
      text-align:center;
      padding:32px 0 18px;
      flex-shrink:0;
    }
    .poi-list{
      flex:1;overflow-y:auto;
      padding:0 28px 16px;
      scrollbar-width:thin;
    }
    .poi-list::-webkit-scrollbar{width:4px}
    .poi-list::-webkit-scrollbar-thumb{background:rgba(52,48,44,0.18);border-radius:2px}

    .poi-item{
      padding:14px 0;
      border-bottom:1px solid rgba(36,32,28,0.08);
      cursor:pointer;
      display:grid;
      grid-template-columns:84px 1fr;
      gap:14px;
      align-items:center;
      transition:padding-left 0.22s ease;
    }
    .poi-item:hover{padding-left:6px}
    .poi-item-thumb,
    .poi-item-placeholder{
      width:84px;height:62px;
      object-fit:cover;
      display:block;
      border-radius:2px;
    }
    .poi-item-placeholder{
      background:var(--gold);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--serif);
      font-size:1.5rem;font-weight:500;
      letter-spacing:0.02em;
    }
    .poi-item-text{min-width:0}
    .poi-item-name{
      font-family:var(--serif);
      font-size:1.1rem;font-weight:500;
      color:rgba(36,32,28,0.92);
      letter-spacing:0.02em;
      transition:color 0.2s;
    }
    .poi-item-dist{
      font-family:var(--sans);
      font-size:0.62rem;font-weight:500;
      letter-spacing:0.16em;text-transform:uppercase;
      color:rgba(36,32,28,0.55);
      margin-top:5px;
      transition:color 0.2s;
    }
    .poi-item.active{background:rgba(36,32,28,0.04)}
    .poi-item.active .poi-item-name{color:#000}
    .poi-item.active .poi-item-dist{color:var(--gold)}

    /* Featured sidebar item (Seseh Sunset Villas) */
    .poi-item.featured{
      background:var(--anthracite);
      border-left:3px solid var(--gold);
      padding:18px 16px;
      margin:0 0 14px;
      border-bottom:none;
      border-radius:2px;
    }
    .poi-item.featured:hover{padding-left:18px}
    .poi-item.featured .poi-item-name{
      color:#fff;
      letter-spacing:0.04em;
      font-size:1.2rem;
    }
    .poi-item.featured .poi-item-dist{
      color:var(--gold);
    }
    .poi-item.featured.active{background:#222}

    .panel-foot{
      flex-shrink:0;
      padding:14px 28px 18px;
      border-top:1px solid rgba(36,32,28,0.07);
    }
    .panel-foot-text{
      font-family:var(--sans);
      font-size:0.5rem;font-weight:500;
      letter-spacing:0.2em;text-transform:uppercase;
      color:rgba(36,32,28,0.38);
    }
    .panel-foot-hint{
      font-family:var(--sans);
      font-size:0.65rem;font-weight:500;
      letter-spacing:0.12em;text-transform:uppercase;
      color:rgba(36,32,28,0.55);
      margin-top:6px;
    }

    /* ── RESPONSIVE ── */
    /* iPad portrait */
    @media (min-width:768px) and (max-width:1023px){
      .layout{grid-template-columns:55fr 45fr}
      .panel-title{font-size:2rem}
      .poi-label{font-size:0.6rem;padding:5px 9px}
    }

    /* Mobile (portrait + landscape) */
    @media (max-width:767px){
      html,body{height:auto;overflow-y:auto;overflow-x:hidden}
      .layout{
        position:relative;
        top:0;margin-top:76px;
        bottom:auto;
        display:flex;
        flex-direction:column;
        height:auto;
      }
      .map-frame{
        aspect-ratio:5272/3948;
        width:100%;
        height:auto;
      }
      .panel{
        border-left:none;
        border-top:1px solid rgba(36,32,28,0.1);
        height:auto;
        overflow:visible;
      }
      .panel-title{font-size:1.8rem;padding:24px 0 12px}
      .poi-list{
        overflow-y:visible;
        padding:0 16px 16px;
      }
      .poi-popup{width:200px}
      .poi-label{font-size:0.55rem;padding:4px 7px;letter-spacing:0.08em}
      .poi-item{grid-template-columns:64px 1fr;gap:12px;padding:12px 0}
      .poi-item-thumb,.poi-item-placeholder{width:64px;height:48px}
      .poi-item-placeholder{font-size:1.2rem}
      .poi-item.featured{padding:14px 12px}
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <script src="../js/nav.js"></script>
  <div class="page-intro"><img class="intro-logo" src="../assets/logos/SS%20logo%20light.svg" alt=""></div>

  <div class="layout">
    <div class="map-frame" id="mapFrame">
      <picture>
        <source media="(min-width:768px)" type="image/webp" srcset="../assets/images/seseh/seseh-aerial-2400.webp">
        <source media="(max-width:767px)" type="image/webp" srcset="../assets/images/seseh/seseh-aerial-1200.webp">
        <source media="(min-width:768px)" srcset="../assets/images/seseh/seseh-aerial-2400.jpg">
        <img src="../assets/images/seseh/seseh-aerial-1200.jpg" alt="Vue aérienne de Seseh Sunset Villas et de ses environs">
      </picture>
      <div class="map-overlay-top"></div>
      <div class="map-overlay-bottom"></div>
      <!-- POIs injected by JS -->
    </div>

    <aside class="panel">
      <h1 class="panel-title">Vivre à Seseh</h1>
      <div class="poi-list" id="poiList">
        <!-- Items injected by JS -->
      </div>
      <div class="panel-foot">
        <div class="panel-foot-text">Seseh · Bali · Indonésie</div>
        <div class="panel-foot-hint">Cliquez sur un lieu pour explorer</div>
      </div>
    </aside>
  </div>

<script>
(function(){
  const mapFrame = document.getElementById('mapFrame');
  const poiListEl = document.getElementById('poiList');
  let pois = [];
  let activeId = null;

  function escapeHTML(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  // ── Load POI data ──
  fetch('pois.json')
    .then(r => r.json())
    .then(data => {
      pois = Array.isArray(data) ? data : [];
      renderPois();
      renderSidebar();
    })
    .catch(() => {
      // Silent fail — page still usable, no POI overlay
    });

  // ── Render POI markers on map ──
  function renderPois(){
    const fragment = document.createDocumentFragment();
    pois.forEach(poi => {
      const el = document.createElement('div');
      el.className = 'poi' + (poi.isMainLocation ? ' poi--featured' : '');
      el.style.left = poi.position.left;
      el.style.top = poi.position.top;
      el.dataset.id = poi.id;
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', poi.name);
      el.setAttribute('aria-expanded', 'false');

      const lineH = poi.lineHeight || 50;
      el.innerHTML =
        '<div class="poi-label">' + escapeHTML(poi.name) + '</div>' +
        '<div class="poi-line" style="--line-h:' + lineH + 'px"></div>' +
        '<div class="poi-dot"></div>';

      el.addEventListener('click', e => {
        e.stopPropagation();
        activatePoi(poi.id);
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          activatePoi(poi.id);
        }
      });

      fragment.appendChild(el);
    });
    mapFrame.appendChild(fragment);
  }

  // ── Render sidebar items ──
  function renderSidebar(){
    poiListEl.innerHTML = '';
    pois.forEach(poi => {
      const item = document.createElement('div');
      item.className = 'poi-item' + (poi.isMainLocation ? ' featured' : '');
      item.dataset.id = poi.id;
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', poi.name);

      const text =
        '<div class="poi-item-text">' +
          '<div class="poi-item-name">' + escapeHTML(poi.name) + '</div>' +
          '<div class="poi-item-dist">' + escapeHTML(poi.distance || '') + '</div>' +
        '</div>';

      if (poi.image){
        const img = document.createElement('img');
        img.className = 'poi-item-thumb';
        img.src = poi.image;
        img.alt = poi.imageAlt || poi.name;
        img.loading = 'lazy';
        img.addEventListener('error', () => {
          const ph = document.createElement('div');
          ph.className = 'poi-item-placeholder';
          ph.textContent = poi.number != null ? poi.number : '';
          img.replaceWith(ph);
        });
        item.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'poi-item-placeholder';
        ph.textContent = poi.number != null ? poi.number : '';
        item.appendChild(ph);
      }
      item.insertAdjacentHTML('beforeend', text);

      item.addEventListener('click', () => activatePoi(poi.id));
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          activatePoi(poi.id);
        }
      });

      poiListEl.appendChild(item);
    });
  }

  // ── Activate / toggle POI ──
  function activatePoi(id){
    if (activeId === id){
      deactivateAll();
      return;
    }
    deactivateAll();
    activeId = id;

    const poi = pois.find(p => p.id === id);
    if (!poi) return;

    const poiEl = mapFrame.querySelector('.poi[data-id="' + CSS.escape(id) + '"]');
    const itemEl = poiListEl.querySelector('.poi-item[data-id="' + CSS.escape(id) + '"]');

    if (poiEl){
      poiEl.classList.add('active');
      poiEl.setAttribute('aria-expanded', 'true');
      showPopup(poiEl, poi);
    }
    if (itemEl){
      itemEl.classList.add('active');
      itemEl.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }

  function deactivateAll(){
    activeId = null;
    mapFrame.querySelectorAll('.poi.active').forEach(el => {
      el.classList.remove('active','popup-left','popup-above','popup-below');
      el.setAttribute('aria-expanded', 'false');
      const popup = el.querySelector('.poi-popup');
      if (popup) popup.remove();
    });
    poiListEl.querySelectorAll('.poi-item.active').forEach(el => el.classList.remove('active'));
  }

  // ── Popup with smart positioning ──
  function showPopup(poiEl, poi){
    const popup = document.createElement('div');
    popup.className = 'poi-popup';

    const closeBtn = '<button class="poi-popup-close" aria-label="Fermer" type="button">×</button>';
    const body =
      '<div class="poi-popup-body">' +
        '<div class="poi-popup-title">' + escapeHTML(poi.name) + '</div>' +
        (poi.description ? '<div class="poi-popup-desc">' + escapeHTML(poi.description) + '</div>' : '') +
        (poi.distance ? '<div class="poi-popup-dist">' + escapeHTML(poi.distance) + '</div>' : '') +
      '</div>';

    if (poi.image){
      const img = document.createElement('img');
      img.className = 'poi-popup-img';
      img.src = poi.image;
      img.alt = poi.imageAlt || poi.name;
      img.addEventListener('error', () => img.remove());
      popup.insertAdjacentHTML('beforeend', closeBtn);
      popup.appendChild(img);
      popup.insertAdjacentHTML('beforeend', body);
    } else {
      popup.innerHTML = closeBtn + body;
    }

    popup.querySelector('.poi-popup-close').addEventListener('click', e => {
      e.stopPropagation();
      deactivateAll();
    });
    popup.addEventListener('click', e => e.stopPropagation());

    poiEl.appendChild(popup);

    // Smart positioning: measure after layout
    requestAnimationFrame(() => {
      const frameRect = mapFrame.getBoundingClientRect();
      const poiRect = poiEl.getBoundingClientRect();
      const popupRect = popup.getBoundingClientRect();

      // Horizontal: if popup-right would overflow, flip to left
      if (poiRect.right + popupRect.width + 14 > frameRect.right - 8){
        poiEl.classList.add('popup-left');
      }
      // Vertical: if vertical-centred popup overflows top → place below; overflows bottom → place above
      const verticalCenter = poiRect.top + poiRect.height / 2;
      if (verticalCenter - popupRect.height / 2 < frameRect.top + 8){
        poiEl.classList.add('popup-below');
      } else if (verticalCenter + popupRect.height / 2 > frameRect.bottom - 8){
        poiEl.classList.add('popup-above');
      }

      popup.classList.add('visible');
    });
  }

  // ── Click outside closes ──
  document.addEventListener('click', e => {
    if (!activeId) return;
    if (e.target.closest('.poi') || e.target.closest('.poi-item') || e.target.closest('.poi-popup')) return;
    deactivateAll();
  });

  // ── Escape closes ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && activeId) deactivateAll();
  });
})();
</script>

</body>
</html>
