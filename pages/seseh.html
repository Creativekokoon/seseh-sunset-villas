<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Seseh — Seseh Sunset Villas</title>
  <link rel="stylesheet" href="https://use.typekit.net/xkb5dqg.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    :root{
      --serif:'the-seasons',Georgia,serif;
      --sans:'Inter','Helvetica Neue',Arial,sans-serif;
      --gold:#c8a86a;
      --cream:#E8E4DC;
      --anthracite:#242220;
    }

    html,body{
      width:100%;height:100%;overflow:hidden;
      background:var(--cream);
      -webkit-font-smoothing:antialiased;
      font-family:var(--sans);
    }

    /* ── PAGE INTRO ── */
    .page-intro{position:fixed;top:0;left:0;width:100vw;height:100vh;height:100lvh;z-index:850;background:#242220;animation:introFadeOut 0.4s 0.9s ease forwards;pointer-events:none}
    .intro-logo{position:absolute;top:50%;top:50dvh;left:50%;height:96px;width:auto;opacity:0;transform:translate(-50%,-50%) scale(0.88);animation:introLogoIn 0.5s 0.1s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
    @keyframes introLogoIn{to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes introFadeOut{to{opacity:0}}

    /* ── LAYOUT ── */
    .layout{
      position:fixed;
      top:76px;left:0;right:0;bottom:0;
      z-index:1;
      display:grid;
      grid-template-columns:68fr 32fr;
    }

    /* ── MAP FRAME ── */
    .map-frame{
      position:relative;
      overflow:hidden;
      background:#0a0a0a;
      width:100%;height:100%;
    }
    .map-image-wrap{
      position:absolute;inset:0;
      width:100%;height:100%;
    }
    .map-image-wrap picture{
      position:absolute;inset:0;
      width:100%;height:100%;
      display:block;
    }
    .map-image-wrap picture img{
      width:100%;height:100%;
      object-fit:cover;
      object-position:50% 60%;
      display:block;
    }
    .map-overlay-top,
    .map-overlay-bottom{
      position:absolute;left:0;right:0;
      pointer-events:none;
      z-index:2;
    }
    .map-overlay-top{
      top:0;height:24%;
      background:linear-gradient(to bottom,rgba(10,8,6,0.5),transparent);
    }
    .map-overlay-bottom{
      bottom:0;height:28%;
      background:linear-gradient(to top,rgba(10,8,6,0.5),transparent);
    }

    /* ── POI MARKER (label + line + dot) ── */
    .poi{
      position:absolute;
      transform:translate(-50%,-100%);
      display:flex;flex-direction:column;align-items:center;
      z-index:5;
      pointer-events:none;
    }
    .poi-label{
      pointer-events:auto;
      cursor:pointer;
      background:rgba(20,18,14,0.88);
      border:0.5px solid rgba(201,168,106,0.45);
      color:rgba(255,252,248,0.96);
      font-family:var(--sans);
      font-size:0.66rem;font-weight:500;
      letter-spacing:0.1em;text-transform:uppercase;
      padding:6px 11px;
      white-space:nowrap;
      transition:background 0.25s ease,color 0.25s ease,border-color 0.25s ease;
    }
    .poi-label:hover{border-color:var(--gold)}
    .poi-label:focus-visible{outline:none;box-shadow:0 0 0 2px var(--gold)}
    .poi-line{
      width:1px;
      height:var(--line-h,50px);
      background:rgba(255,255,255,0.85);
      transition:background 0.25s ease,width 0.25s ease;
    }
    .poi-dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 0 2px rgba(201,168,106,0.18),0 1px 4px rgba(0,0,0,0.4);
      transition:transform 0.25s ease,background 0.25s ease,box-shadow 0.25s ease;
    }

    /* Featured (Seseh Sunset Villas) */
    .poi--featured .poi-label{
      background:rgba(201,168,106,0.95);
      color:#1a1208;
      font-weight:600;
      border-color:rgba(255,255,255,0.4);
    }

    /* Active POI */
    .poi.active .poi-label{
      background:rgba(201,168,106,0.98);
      color:#1a1208;
      font-weight:600;
      border-color:rgba(255,255,255,0.5);
    }
    .poi.active .poi-line{
      background:var(--gold);
      width:1.5px;
    }
    .poi.active .poi-dot{
      transform:scale(1.4);
      background:#fff;
      animation:poiPulse 2.2s ease-out infinite;
    }
    @keyframes poiPulse{
      0%   { box-shadow:0 0 0 3px rgba(201,168,106,0.55), 0 0 0 0 rgba(201,168,106,0.55), 0 1px 6px rgba(0,0,0,0.5); }
      70%  { box-shadow:0 0 0 3px rgba(201,168,106,0.55), 0 0 0 16px rgba(201,168,106,0),    0 1px 6px rgba(0,0,0,0.5); }
      100% { box-shadow:0 0 0 3px rgba(201,168,106,0.55), 0 0 0 0 rgba(201,168,106,0),    0 1px 6px rgba(0,0,0,0.5); }
    }

    /* ── PANEL (sidebar) ── */
    .panel{
      background:var(--cream);
      border-left:1px solid rgba(36,32,28,0.1);
      display:flex;flex-direction:column;
      overflow:hidden;
      height:100%;
    }
    .panel-header{
      flex-shrink:0;
      padding:40px 0 32px;
      text-align:center;
    }
    .panel-title{
      font-family:var(--serif);
      font-size:2.4rem;font-weight:500;
      letter-spacing:0.11em;text-transform:uppercase;
      color:rgba(52,48,44,0.92);
      margin:0;
    }
    .panel-hint{
      font-family:var(--sans);
      font-size:0.65rem;font-weight:500;
      letter-spacing:0.18em;text-transform:uppercase;
      color:rgba(36,32,28,0.55);
      margin-top:14px;
    }
    .poi-list{
      flex:1;overflow-y:auto;
      padding:0 28px 16px;
      scrollbar-width:thin;
    }
    .poi-list::-webkit-scrollbar{width:4px}
    .poi-list::-webkit-scrollbar-thumb{background:rgba(52,48,44,0.18);border-radius:2px}

    .poi-item{
      padding:14px 12px;
      border-bottom:1px solid rgba(36,32,28,0.08);
      cursor:pointer;
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      align-items:start;
      border-radius:0;
      transition:padding-left 0.22s ease, background 0.25s ease;
    }
    .poi-item:hover{padding-left:18px}
    .poi-item-text{min-width:0}
    .poi-item-row{
      display:grid;
      grid-template-columns:1fr auto;
      align-items:start;
      gap:8px;
    }
    .poi-item-name{
      font-family:var(--serif);
      font-size:1.2rem;font-weight:500;
      color:rgba(36,32,28,0.92);
      letter-spacing:0.02em;
      transition:color 0.2s;
    }
    .poi-item-dist{
      font-family:var(--sans);
      font-size:0.68rem;font-weight:500;
      letter-spacing:0.16em;text-transform:uppercase;
      color:rgba(36,32,28,0.55);
      margin-top:6px;
      display:flex;align-items:center;gap:6px;
      transition:color 0.2s;
    }
    .poi-item-dist svg{
      width:16px;height:16px;flex-shrink:0;
      color:#a88945;
    }
    .poi-item.active{
      background:rgba(201,168,106,0.13);
      box-shadow:inset 3px 0 0 var(--gold);
      padding-left:18px;
    }
    .poi-item.active .poi-item-name{color:#000}
    .poi-item.active .poi-item-dist{color:var(--gold)}

    .poi-cam{
      background:none;border:none;cursor:pointer;
      padding:4px;margin-top:-2px;
      color:rgba(36,32,28,0.35);
      transition:color 0.22s;
    }
    .poi-cam:hover,
    .poi-cam:focus-visible{color:var(--gold);outline:none}
    .poi-cam svg{width:20px;height:20px;display:block}
    .poi-item.active .poi-cam{color:var(--gold)}

    .poi-item-desc{
      font-family:var(--sans);
      font-size:0.82rem;line-height:1.55;
      color:rgba(36,32,28,0.7);
      max-height:0;overflow:hidden;opacity:0;
      transition:max-height 0.4s ease,opacity 0.35s ease,margin-top 0.4s ease;
    }
    .poi-item.active .poi-item-desc{
      max-height:160px;opacity:1;margin-top:10px;
    }

    /* ── DESTINATIONS list (sidebar + map popup) ── */
    .poi-item-destinations{
      max-height:0;overflow:hidden;opacity:0;
      transition:max-height 0.45s ease,opacity 0.35s ease,margin-top 0.45s ease;
    }
    .poi-item.active .poi-item-destinations{
      max-height:600px;opacity:1;margin-top:10px;
    }

    /* Sidebar destination items — light theme */
    .poi-item-destinations .dest-item{
      display:flex;gap:12px;
      padding:10px 4px;
      align-items:center;
      cursor:default;
      transition:background 0.2s ease;
    }
    .poi-item-destinations .dest-item--clickable{cursor:pointer}
    .poi-item-destinations .dest-item:not(:last-child){
      border-bottom:0.5px solid rgba(36,32,28,0.08);
    }
    .poi-item-destinations .dest-item--clickable:hover{
      background:rgba(201,168,106,0.08);
    }
    .poi-item-destinations .dest-item--clickable:hover .dest-arrow{
      color:var(--gold);transform:translateX(2px);
    }
    .poi-item-destinations .dest-name{color:rgba(36,32,28,0.92)}
    .poi-item-destinations .dest-description{color:rgba(36,32,28,0.55)}
    .poi-item-destinations .dest-arrow{color:rgba(36,32,28,0.55)}
    .poi-item-destinations .dest-item--clickable:hover .dest-arrow{color:rgba(36,32,28,0.85)}

    /* Generic destination styles */
    .dest-info{flex:1;min-width:0}
    .dest-name{
      font-family:var(--sans);
      font-size:12px;font-weight:500;
      margin-bottom:2px;
    }
    .dest-description{
      font-family:var(--sans);
      font-size:10px;
      letter-spacing:0.02em;
    }
    .dest-arrow{
      width:14px;height:14px;
      flex-shrink:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:color 0.2s ease,transform 0.2s ease;
    }
    .dest-arrow svg{
      width:100%;height:100%;
      display:block;
      fill:currentColor;
    }


    /* Featured sidebar item (Seseh Sunset Villas) */
    .poi-item.featured{
      background:var(--anthracite);
      border-left:3px solid var(--gold);
      padding:18px 16px;
      margin:0 0 14px;
      border-bottom:none;
      border-radius:0;
    }
    .poi-item.featured:hover{padding-left:18px}
    .poi-item.featured.active{box-shadow:none}
    .poi-item.featured .poi-item-name{
      color:#fff;
      letter-spacing:0.04em;
      font-size:1.3rem;
    }
    .poi-item.featured .poi-item-dist{color:var(--gold)}
    .poi-item.featured .poi-item-desc{color:rgba(255,252,248,0.65)}
    .poi-item.featured .poi-cam{color:rgba(255,252,248,0.4)}
    .poi-item.featured .poi-cam:hover,
    .poi-item.featured .poi-cam:focus-visible{color:var(--gold)}
    .poi-item.featured.active{background:#222}


    /* ── IMAGE OVERLAY (lightbox) ── */
    .img-overlay{
      position:fixed;inset:0;z-index:900;
      background:rgba(8,6,4,0.92);
      display:flex;align-items:center;justify-content:center;
      padding:48px 24px;
      opacity:0;pointer-events:none;
      transition:opacity 0.32s ease;
    }
    .img-overlay.visible{opacity:1;pointer-events:auto}
    .img-overlay-inner{
      position:relative;
      max-width:960px;width:100%;
      max-height:100%;
      display:flex;flex-direction:column;
    }
    .img-overlay-img{
      width:100%;
      height:600px;
      object-fit:cover;
      display:block;
    }
    .img-overlay-empty{
      width:100%;height:600px;
      background:rgba(36,34,32,0.7);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--sans);
      font-size:0.7rem;letter-spacing:0.22em;text-transform:uppercase;
      color:rgba(255,252,248,0.42);
    }
    .img-overlay-caption{
      background:rgba(10,8,6,0.92);
      padding:20px 24px;
    }
    .img-overlay-name{
      font-family:var(--serif);
      font-size:1.4rem;font-weight:500;
      letter-spacing:0.04em;text-transform:uppercase;
      color:var(--gold);
      margin-bottom:6px;
    }
    .img-overlay-desc{
      font-family:var(--sans);
      font-size:0.78rem;line-height:1.5;
      color:rgba(255,252,248,0.72);
    }
    .img-overlay-close{
      position:absolute;top:-44px;right:0;
      background:none;border:none;
      font-family:var(--sans);
      font-size:0.6rem;font-weight:500;
      letter-spacing:0.2em;text-transform:uppercase;
      color:rgba(255,252,248,0.6);
      cursor:pointer;padding:8px;
      transition:color 0.2s;
    }
    .img-overlay-close:hover{color:#fff}


    /* ── RESPONSIVE ── */
    /* iPad portrait */
    @media (min-width:768px) and (max-width:1023px){
      .layout{grid-template-columns:62fr 38fr}
      .panel-header{padding:32px 0 26px}
      .panel-title{font-size:2rem}
      .poi-label{font-size:0.6rem;padding:5px 9px}
    }

    /* ── Mobile (portrait + landscape) ── */
    @media (max-width:767px){
      html,body{height:auto;overflow-y:auto;overflow-x:hidden}

      /* Layout: header → map → list */
      .layout{
        position:relative;
        top:0;margin-top:76px;
        bottom:auto;
        display:flex;
        flex-direction:column;
        height:auto;
      }
      .panel{
        display:contents; /* let header & list become flex children of .layout */
      }
      .panel-header{
        order:1;
        padding:32px 20px 22px;
        margin:0;
        text-align:center;
        border-bottom:none;
      }
      .map-frame{
        order:2;
        width:100%;
        height:auto;
        aspect-ratio:4/5; /* taller image so the area is more readable */
      }
      .map-image-wrap picture img{
        object-position:62% 60%; /* shift right slightly to show more of the east coast */
      }
      .poi-list{
        order:3;
        overflow-y:visible;
        padding:24px 18px 40px;
      }

      /* Header typo */
      .panel-title{font-size:2rem;letter-spacing:0.1em}
      .panel-hint{font-size:0.58rem;letter-spacing:0.16em;margin-top:10px}

      /* POI markers on the map — clickable */
      .poi-label{font-size:0.55rem;padding:4px 7px;letter-spacing:0.08em}

      /* List item — only the ACTIVE one is shown on mobile */
      .poi-item{
        display:none;
        grid-template-columns:1fr;
        gap:0;
        padding:18px 14px;
        min-height:64px;
        align-items:start;
      }
      .poi-item.active{
        display:grid;
        padding-left:14px;
      }
      .poi-item-row{gap:10px}
      .poi-item-name{font-size:1.2rem;line-height:1.25}
      .poi-item-dist{font-size:0.66rem;letter-spacing:0.14em;margin-top:6px}
      .poi-item-dist svg{width:14px;height:14px}
      .poi-cam{padding:6px;margin:-4px -6px 0 0;pointer-events:auto;cursor:pointer}
      .poi-cam svg{width:22px;height:22px}

      /* Active item's description visible */
      .poi-item.active .poi-item-desc{
        font-size:0.88rem;line-height:1.55;
        max-height:none;opacity:1;overflow:visible;
        margin-top:12px;
        transition:none;
      }
      /* Destinations list always visible on active item (mobile) */
      .poi-item.active .poi-item-destinations{
        max-height:none;opacity:1;overflow:visible;
        margin-top:12px;
        transition:none;
      }
      .poi-item-destinations .dest-name{font-size:13px}
      .poi-item-destinations .dest-description{font-size:11px}

      /* Featured (Seseh Sunset Villas) */
      .poi-item.featured{
        margin:0;
        padding:22px 18px;
      }
      .poi-item.featured.active{display:grid}
      .poi-item.featured .poi-item-name{font-size:1.35rem}
      .poi-item.featured .poi-item-desc{font-size:0.9rem}

      /* Lightbox */
      .img-overlay{padding:32px 16px}
      .img-overlay-img,.img-overlay-empty{height:280px}
      .img-overlay-close{top:-36px;font-size:0.55rem}
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <script src="../js/nav.js"></script>
  <div class="page-intro"><img class="intro-logo" src="../assets/logos/SS%20logo%20light.svg" alt=""></div>

  <div class="layout">
    <div class="map-frame" id="mapFrame">
      <div class="map-image-wrap" id="mapImageWrap">
        <picture>
          <source media="(min-width:768px)" type="image/webp" srcset="../assets/images/seseh/seseh-aerial-2400.webp">
          <source media="(max-width:767px)" type="image/webp" srcset="../assets/images/seseh/seseh-aerial-1200.webp">
          <source media="(min-width:768px)" srcset="../assets/images/seseh/seseh-aerial-2400.jpg">
          <img src="../assets/images/seseh/seseh-aerial-1200.jpg" alt="Vue aérienne de Seseh Sunset Villas et de ses environs">
        </picture>
        <div class="map-overlay-top"></div>
        <div class="map-overlay-bottom"></div>
        <!-- POIs injected by JS -->
      </div>
    </div>

    <aside class="panel">
      <div class="panel-header">
        <h1 class="panel-title">Vivre à Seseh</h1>
        <div class="panel-hint">Cliquez sur un lieu pour explorer</div>
      </div>
      <div class="poi-list" id="poiList">
        <!-- Items injected by JS -->
      </div>
    </aside>
  </div>

  <!-- Image overlay (lightbox) -->
  <div class="img-overlay" id="imgOverlay" role="dialog" aria-modal="true" aria-label="Galerie photo">
    <div class="img-overlay-inner">
      <button class="img-overlay-close" id="overlayClose" type="button">✕ Fermer</button>
      <div id="overlayImgWrap"></div>
      <div class="img-overlay-caption">
        <div class="img-overlay-name" id="overlayName"></div>
        <div class="img-overlay-desc" id="overlayDesc"></div>
      </div>
    </div>
  </div>


<script>
(function(){
  const mapFrame = document.getElementById('mapFrame');
  const mapImageWrap = document.getElementById('mapImageWrap');
  const poiListEl = document.getElementById('poiList');
  const overlay = document.getElementById('imgOverlay');
  const overlayImgWrap = document.getElementById('overlayImgWrap');
  const overlayName = document.getElementById('overlayName');
  const overlayDesc = document.getElementById('overlayDesc');
  const overlayClose = document.getElementById('overlayClose');

  let pois = [];
  let activeId = null;

  const CAM_SVG =

  function escapeHTML(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  // Build inner HTML for a list of destination items (no wrapper, no icons)
  const ARROW_SVG = '<svg viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M446.26,69h0q0-.65,0,0,0-.65,0,0v-.65h0v-.64h0v-.65h0v-.65h0v-.65h0v-.65h0v-.65h-5.82l-212.88,12.29c-1.94,0-3.88,1.29-5.83,2.59-1.29,1.94-1.94,3.88-1.94,5.83,0,3.88,3.88,7.76,7.77,7.76h.65l188.94-14.23L60.62,435.23c-1.29,1.29-2.59,3.88-2.59,5.82s.65,3.88,2.59,5.83c1.29,1.29,3.23,2.59,5.82,2.59s3.88-.65,5.83-2.59L428.14,89.7l-14.23,188.29c-.65,4.53,3.23,8.41,7.77,8.41h.65c3.88,0,7.76-3.23,7.76-7.77l16.18-209.64h0Z"/></svg>';
  function renderDestinationItems(destinations){
    return destinations.map((d, i) => {
      const clickable = true;
      const cls = 'dest-item dest-item--clickable';
      const arrow = '<span class="dest-arrow">' + ARROW_SVG + '</span>';
      return (
        '<div class="' + cls + '" data-index="' + i + '">' +
          '<div class="dest-info">' +
            '<div class="dest-name">' + escapeHTML(d.name) + '</div>' +
            '<div class="dest-description">' + escapeHTML(d.description || '') + '</div>' +
          '</div>' +
          arrow +
        '</div>'
      );
    }).join('');
  }
  // Sidebar wrapper (collapsed by default, expanded when item is active)

  // ── Load POI data ──
  fetch('pois.json')
    .then(r => r.json())
    .then(data => {
      pois = Array.isArray(data) ? data : [];
      renderPois();
      renderSidebar();
      // Pre-select the main location on load
      const main = pois.find(p => p.isMainLocation) || pois[0];
      if (main) activatePoi(main.id, {scroll:false});
    })
    .catch(() => { /* silent */ });

  // ── Render POI markers on map ──
  function renderPois(){
    const fragment = document.createDocumentFragment();
    pois.forEach(poi => {
      const el = document.createElement('div');
      el.className = 'poi' + (poi.isMainLocation ? ' poi--featured' : '');
      el.dataset.id = poi.id;

      const lineH = poi.lineHeight || 50;

      const label = document.createElement('div');
      label.className = 'poi-label';
      label.textContent = poi.name;
      label.setAttribute('role', 'button');
      label.setAttribute('tabindex', '0');
      label.setAttribute('aria-label', poi.name);
      label.addEventListener('click', e => {
        e.stopPropagation();
        activatePoi(poi.id);
      });
      label.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          activatePoi(poi.id);
        }
      });

      const line = document.createElement('div');
      line.className = 'poi-line';
      line.style.setProperty('--line-h', lineH + 'px');

      const dot = document.createElement('div');
      dot.className = 'poi-dot';

      el.appendChild(label);
      el.appendChild(line);
      el.appendChild(dot);

      fragment.appendChild(el);
    });
    mapImageWrap.appendChild(fragment);
    updatePoiPositions();
  }

  // ── Compute pixel positions of POIs based on actual rendered image bounds ──
  // The image fills the wrap via object-fit:cover, so it's scaled and possibly
  // cropped. POI percentages are relative to the IMAGE, not the wrap, so we map
  // them to pixel coordinates inside the wrap.
  const IMG_RATIO = 5272 / 4082;
  // Object-position values must match the CSS. Mobile shifts X right to show more of the east coast.
  function getObjPos(){
    return window.innerWidth <= 767
      ? { x: 62, y: 60 }
      : { x: 50, y: 60 };
  }
  function updatePoiPositions(){
    if (!mapImageWrap) return;
    const w = mapImageWrap.offsetWidth;
    const h = mapImageWrap.offsetHeight;
    if (!w || !h) return;
    const wrapRatio = w / h;
    let imgW, imgH, imgL, imgT;
    if (wrapRatio > IMG_RATIO){
      // Wrap wider than image — image fills width, overflow vertically
      imgW = w;
      imgH = w / IMG_RATIO;
    } else {
      // Wrap taller than image — image fills height, overflow horizontally
      imgH = h;
      imgW = h * IMG_RATIO;
    }
    const pos = getObjPos();
    imgL = (w - imgW) * (pos.x / 100);
    imgT = (h - imgH) * (pos.y / 100);
    pois.forEach(poi => {
      const el = mapImageWrap.querySelector('.poi[data-id="' + CSS.escape(poi.id) + '"]');
      if (!el) return;
      const topPct = parseFloat(poi.position.top);
      const leftPct = parseFloat(poi.position.left);
      el.style.left = (imgL + (leftPct / 100) * imgW) + 'px';
      el.style.top  = (imgT + (topPct  / 100) * imgH) + 'px';
    });
  }
  window.addEventListener('resize', updatePoiPositions);

  // ── Render sidebar items ──
  function renderSidebar(){
    poiListEl.innerHTML = '';
    pois.forEach(poi => {
      const item = document.createElement('div');
      item.className = 'poi-item' + (poi.isMainLocation ? ' featured' : '');
      item.dataset.id = poi.id;
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', poi.name);

      // Thumbnail intentionally not rendered in sidebar — keeping it text-only.

      // Text column
      const hasDestinations = poi.destinations && poi.destinations.length > 0;
      const text = document.createElement('div');
      text.className = 'poi-item-text';
      const camHTML = hasDestinations
        ? ''
        : '<button class="poi-cam" type="button" aria-label="Voir la photo">' + CAM_SVG + '</button>';
      text.innerHTML =
        '<div class="poi-item-row">' +
          '<div>' +
            '<div class="poi-item-name">' + escapeHTML(poi.name) + '</div>' +
            '<div class="poi-item-dist">' + (CAT_ICONS[poi.category] || '') + '<span>' + escapeHTML(poi.distance || '') + '</span></div>' +
          '</div>' +
          camHTML +
        '</div>' +
        (poi.description ? '<div class="poi-item-desc">' + escapeHTML(poi.description) + '</div>' : '') +
        (hasDestinations ? renderDestinationsHTML(poi.destinations) : '');
      item.appendChild(text);

      if (!hasDestinations){
        const camBtn = item.querySelector('.poi-cam');
        camBtn.addEventListener('click', e => {
          e.stopPropagation();
          openOverlay(poi.id);
        });
        camBtn.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' '){
            e.preventDefault();
            e.stopPropagation();
            openOverlay(poi.id);
          }
        });
      } else {
        // Wire destination clicks → open image lightbox (same as camera button)
        item.querySelectorAll('.dest-item--clickable').forEach((el) => {
          el.addEventListener('click', e => {
            e.stopPropagation();
            const dest = poi.destinations[+el.dataset.index];
            if (dest) openOverlayWithImage(dest.image, dest.venue || dest.name, dest.description);
          });
        });
      }

      item.addEventListener('click', () => activatePoi(poi.id));
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          activatePoi(poi.id);
        }
      });

      poiListEl.appendChild(item);
    });
  }

  // ── Activate / toggle POI (highlights only — no map popup) ──
  // Seseh Sunset Villas (main location) is the resting default — clicks always
  // fall back to it instead of leaving nothing selected.
  function getMainId(){
    const m = pois.find(p => p.isMainLocation);
    return m ? m.id : null;
  }

  function activatePoi(id, opts){
    opts = opts || {};
    const mainId = getMainId();
    // Toggle handling: clicking the active POI falls back to main (or stays if it IS main)
    if (activeId === id && !opts.force){
      if (mainId && id !== mainId){
        activatePoi(mainId, {scroll:false});
      }
      return;
    }
    deactivateAll();
    activeId = id;
    const poi = pois.find(p => p.id === id);

    const poiEl = mapFrame.querySelector('.poi[data-id="' + CSS.escape(id) + '"]');
    const itemEl = poiListEl.querySelector('.poi-item[data-id="' + CSS.escape(id) + '"]');
    if (poiEl) poiEl.classList.add('active');
    if (itemEl){
      itemEl.classList.add('active');
      if (opts.scroll !== false){
        const block = window.innerWidth <= 767 ? 'nearest' : 'center';
        itemEl.scrollIntoView({behavior:'smooth', block});
      }
    }

  }

  function deactivateAll(){
    activeId = null;
    mapFrame.querySelectorAll('.poi.active').forEach(el => el.classList.remove('active'));
    poiListEl.querySelectorAll('.poi-item.active').forEach(el => el.classList.remove('active'));
  }


  function fallbackToMain(){
    const mainId = getMainId();
    if (mainId && activeId !== mainId){
      activatePoi(mainId, {scroll:false});
    }
  }

  // ── Image overlay (lightbox) ──
  function openOverlay(id){
    const poi = pois.find(p => p.id === id);
    if (!poi) return;
    openOverlayWithImage(poi.image, poi.name, poi.description, poi.imageAlt);
  }

  // Generic helper — used by camera button (POI image) and destination items
  function openOverlayWithImage(image, name, description, alt){
    overlayName.textContent = name || '';
    overlayDesc.textContent = description || '';
    overlayImgWrap.innerHTML = '';

    if (image){
      const img = document.createElement('img');
      img.className = 'img-overlay-img';
      img.src = image;
      img.alt = alt || name || '';
      img.addEventListener('error', () => {
        const empty = document.createElement('div');
        empty.className = 'img-overlay-empty';
        empty.textContent = 'Photo bientôt disponible';
        img.replaceWith(empty);
      });
      overlayImgWrap.appendChild(img);
    } else {
      const empty = document.createElement('div');
      empty.className = 'img-overlay-empty';
      empty.textContent = 'Photo bientôt disponible';
      overlayImgWrap.appendChild(empty);
    }

    overlay.classList.add('visible');
  }

  function closeOverlay(){
    overlay.classList.remove('visible');
  }

  overlayClose.addEventListener('click', closeOverlay);
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeOverlay();
  });


  // ── Click outside POI/sidebar falls back to Seseh Sunset Villas ──
  // (lightbox clicks ignored — closing the lightbox should preserve the active POI)
  document.addEventListener('click', e => {
    if (e.target.closest('.poi') || e.target.closest('.poi-item') || e.target.closest('.img-overlay')) return;
    fallbackToMain();
  });

  // ── Escape closes overlay or falls back to Seseh Sunset Villas ──
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (overlay.classList.contains('visible')) closeOverlay();
    else fallbackToMain();
  });
})();
</script>

</body>
</html>
