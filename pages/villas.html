<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Les Villas — Seseh Sunset Villas</title>
  <link rel="stylesheet" href="https://use.typekit.net/xkb5dqg.css">
  <link rel="stylesheet" href="../css/villas.css">
  <style>
    #site-topbar { background:#E8E8E6 !important; }
    #site-topbar .nav-back, #site-topbar .nav-brand { color:rgba(52,48,44,0.75) !important; }
    #site-topbar .nav-menu-btn { color:#E8E8E6 !important; background:rgba(52,48,44,0.88) !important; }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <script src="../js/nav.js"></script>


  <!-- Page-in wipe -->
  <div class="page-intro" id="pageIntro"></div>

  <!-- Zoom layer — populated by JS -->
  <div class="zoom-layer" id="zoomLayer"></div>

  <!-- Topbar -->

  <!-- Villa grid -->
  <main class="villas-grid" id="villasGrid">

    <article class="villa-card" data-villa="elegance"
      style="--bg: url('../assets/images/facade/facade image one bedroom.jpeg')">
      <div class="card-bg"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-title-row">
          <h2 class="card-title">Élégance</h2>
          <div class="card-side-info">
            <div class="card-sub">Loft · 1 Chambre</div>
            <div class="card-price">à partir de 189 000 €</div>
          </div>
        </div>
        <div class="card-cta">Explorer <span class="cta-arr">→</span></div>
      </div>
    </article>

    <article class="villa-card" data-villa="prestige"
      style="--bg: url('../assets/images/facade/facade image two bedrooms.png'); --bg-pos: center 5%">
      <div class="card-bg"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-title-row">
          <h2 class="card-title">Prestige</h2>
          <div class="card-side-info">
            <div class="card-sub">Villa · 2 Chambres</div>
            <div class="card-price">à partir de 260 000 €</div>
          </div>
        </div>
        <div class="card-cta">Explorer <span class="cta-arr">→</span></div>
      </div>
    </article>

    <article class="villa-card" data-villa="signature"
      style="--bg: url('../assets/images/facade/facade twobedroom premium.png')">
      <div class="card-bg"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-title-row">
          <h2 class="card-title">Signature</h2>
          <div class="card-side-info">
            <div class="card-sub">Villa Premium · 2 Chambres</div>
            <div class="card-price">à partir de 310 000 €</div>
          </div>
        </div>
        <div class="card-cta">Explorer <span class="cta-arr">→</span></div>
      </div>
    </article>

    <article class="villa-card" data-villa="exception"
      style="--bg: url('../assets/images/facade/facade twobedroom premium.png')">
      <div class="card-bg"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="card-title-row">
          <h2 class="card-title">Exception</h2>
          <div class="card-side-info">
            <div class="card-sub">Villa · 3 Chambres</div>
            <div class="card-price">à partir de 379 000 €</div>
          </div>
        </div>
        <div class="card-cta">Explorer <span class="cta-arr">→</span></div>
      </div>
    </article>

  </main>

  <!-- Drawer -->

  <script src="../js/villas.js"></script>
</body>
</html>
