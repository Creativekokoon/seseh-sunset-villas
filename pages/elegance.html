<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Élégance — Seseh Sunset Villas</title>
  <link rel="stylesheet" href="https://use.typekit.net/xkb5dqg.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../css/villa.css">
  <style>
    /* Loft only — reduce gap above the plan and grow the map slightly */
    .dark-block { margin-top: 24px; }
    .plan-svg { max-width: 720px; }
    @media (min-width:1024px) and (min-height:900px) {
      .plan-svg { max-width: 760px; }
    }
    /* Match Chambre / Salle de bain text size with the Escalier label (14px) */
    #f1 .pz-text { font-size: 14px; }
    .dark-block.no-plan {
      grid-template-columns: 1fr 1fr;
    }
    .villa-description {
      display:flex;flex-direction:column;gap:18px;
      padding:24px 28px;
      justify-content:center;
    }
    .villa-desc-text {
      font-family:'the-seasons',Georgia,serif;
      font-size:0.95rem;font-weight:300;line-height:1.7;
      color:rgba(52,48,44,0.78);letter-spacing:0.02em;
    }
    .villa-type-label {
      font-family:'Inter','Helvetica Neue',Arial,sans-serif;
      font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;
      color:rgba(82,77,71,0.55);
    }
    .features-grid {
      display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;
    }
    .feat-item {
      font-family:'Inter','Helvetica Neue',Arial,sans-serif;
      font-size:0.65rem;letter-spacing:0.12em;
      color:rgba(57,52,47,0.72);
      padding:6px 0;border-bottom:1px solid rgba(62,58,54,0.08);
    }
    .plan-placeholder {
      display:flex;align-items:center;justify-content:center;
      border-left:1px solid rgba(62,58,54,0.1);
    }
    .plan-placeholder-inner {
      display:flex;flex-direction:column;align-items:center;gap:10px;
    }
    .plan-placeholder-icon {
      width:52px;height:52px;color:rgba(82,77,71,0.3);
    }
    .plan-placeholder-icon svg { width:100%;height:100%; }
    .plan-placeholder-text {
      font-family:'the-seasons',Georgia,serif;
      font-size:0.8rem;letter-spacing:0.12em;
      color:rgba(52,48,44,0.45);
    }
    .plan-placeholder-sub {
      font-family:'Inter','Helvetica Neue',Arial,sans-serif;
      font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;
      color:rgba(82,77,71,0.35);
    }
  </style>
</head>
<body>

  <div id="nav-root"></div>
  <script src="../js/nav.js"></script>

  <div class="page-intro"></div>
  <div class="cursor-tip" id="tip">Explorer</div>
  <div class="bg"></div>

  <div class="page">

    <div class="villa-title">Élégance</div>

    <!-- STATS -->
    <div class="stats">
      <div class="stats-inner">
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="3" width="14" height="14" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <div class="stat-val">48,74 <span class="stat-sm">m²</span></div>
          <div class="stat-lbl">Surface</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 22 16" fill="none">
            <rect x="1" y="5" width="20" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <rect x="1" y="8" width="6" height="7" rx="0.5" stroke="currentColor" stroke-width="1"/>
          </svg>
          <div class="stat-val">1</div>
          <div class="stat-lbl">Chambre</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 22 18" fill="none">
            <path d="M3 9H19Q21 9 21 11V14Q21 16 19 16H3Q1 16 1 14V11Q1 9 3 9Z" stroke="currentColor" stroke-width="1.2"/>
            <path d="M4 9V5Q4 3 6 3H7Q8 3 8 4V5" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <div class="stat-val">1</div>
          <div class="stat-lbl">Salles de bain</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.2"/>
            <text x="10" y="14" text-anchor="middle" font-family="Inter,Helvetica Neue,sans-serif" font-size="8" fill="currentColor">€</text>
          </svg>
          <div class="stat-val">189 000 €</div>
          <div class="stat-lbl">À partir de</div>
        </div>
      </div>
    </div>

    <!-- MAIN BLOCK: plan left | image right -->
    <div class="dark-block">

      <!-- LEFT: plan -->
      <div class="plan-side">
        <div class="plan-inner">
          <div class="plan-top">
            <div class="plan-title-wrap">
              <div class="plan-title">Plan Interactif</div>
              <div class="plan-subtitle">Sélectionnez une pièce pour explorer</div>
            </div>
          </div>

          <div class="plan-svg-wrap">

            <svg id="f1" class="plan-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320">

              <!-- BACKGROUND : non-interactive zones -->
              <g id="f1-shell" pointer-events="none">

                <!-- "Nothing here" zone (bottom-center, greyed) -->
                <rect x="161.2" y="227" width="187.3" height="93"
                      fill="rgba(220,217,210,0.45)" stroke="rgba(61,57,52,0.55)" stroke-width="1"/>
                <g stroke="rgba(61,57,52,0.18)" stroke-width="0.6" stroke-dasharray="3 2" fill="none">
                  <line x1="161.2" y1="227" x2="348.5" y2="320"/>
                  <line x1="161.2" y1="320" x2="348.5" y2="227"/>
                </g>

                <!-- Terrasse (right, greyed — accessible from RDC only) -->
                <rect x="348.5" y="0" width="151.5" height="320"
                      fill="rgba(225,222,215,0.5)" stroke="rgba(61,57,52,0.55)" stroke-width="1"/>
                <g stroke="rgba(61,57,52,0.18)" stroke-width="0.6" stroke-dasharray="3 2" fill="none">
                  <line x1="348.5" y1="0" x2="500" y2="320"/>
                  <line x1="500" y1="0" x2="348.5" y2="320"/>
                </g>
                <text x="424" y="158" text-anchor="middle"
                      font-family="'the-seasons', Georgia, serif" font-size="14"
                      font-weight="500" letter-spacing="0.04em"
                      fill="rgba(94,89,82,0.55)">Terrasse</text>
                <text x="424" y="174" text-anchor="middle"
                      font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="8"
                      letter-spacing="0.06em"
                      fill="rgba(94,89,82,0.45)">accès rez-de-chaussée</text>

                <!-- Stairs treads (decorative) -->
                <g stroke="rgba(61,57,52,0.32)" stroke-width="0.5" fill="none">
                  <line x1="0" y1="99.5" x2="55.8" y2="99.5"/>
                  <line x1="0" y1="122.7" x2="55.8" y2="122.7"/>
                  <line x1="0" y1="140.5" x2="55.8" y2="140.5"/>
                  <line x1="79.8" y1="0" x2="79.8" y2="54.6"/>
                  <line x1="112.6" y1="0" x2="112.6" y2="54.6"/>
                </g>

                <!-- Door opening: chambre → salle de bain -->
                <line x1="107.5" y1="227" x2="147.9" y2="227"
                      stroke="rgba(245,241,233,1)" stroke-width="2"/>

              </g>

              <!-- ESCALIER (visible mais NON-cliquable) -->
              <g id="f1-stairs" pointer-events="none">
                <polygon points="141.8,0 0,0 0,157.8 55.8,157.8 55.8,54.6 141.8,54.6"
                         fill="rgba(225,222,215,0.5)" stroke="rgba(61,57,52,0.95)" stroke-width="1"/>
                <text x="28" y="35"
                      font-family="'the-seasons', Georgia, serif" font-size="14"
                      font-weight="500" letter-spacing="0.04em"
                      fill="rgba(52,48,44,0.85)">Escalier</text>
              </g>

              <!-- INTERACTIVE ZONES -->

              <g class="pzone bedroom1" onclick="pick('bedroom1', this)" onmouseenter="tip.textContent='Chambre'">
                <polygon class="pz-fill" points="141.8,0 141.8,54.6 55.8,54.6 55.8,157.8 0,157.8 0,227 348.5,227 348.5,0"/>
                <text class="pz-text" x="201" y="118" text-anchor="middle">Chambre</text>
              </g>

              <g class="pzone bath2" onclick="pick('bath2', this)" onmouseenter="tip.textContent='Salle de bain'">
                <polygon class="pz-fill" points="0,227 161.2,227 161.2,320 0,320"/>
                <text class="pz-text" x="80" y="278" text-anchor="middle">Salle de bain</text>
              </g>

            </svg>

          </div>
        </div>
      </div>

      <!-- RIGHT: room visuals -->
      <div class="info-side">
        <div class="room-image empty" id="roomImg">

          <div class="room-visual" id="visual-living">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <defs><linearGradient id="eg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e8e2d8"/><stop offset="100%" stop-color="#c8c0b4"/></linearGradient></defs>
                <rect width="800" height="600" fill="url(#eg1)"/>
                <rect y="380" width="800" height="220" fill="#b8aea4"/>
                <rect x="80" y="100" width="280" height="180" fill="#f0ebe4" opacity="0.9"/>
                <rect x="180" y="420" width="200" height="80" fill="#d4c8bc"/>
                <rect x="460" y="140" width="220" height="200" fill="#9e958a" opacity="0.85"/>
                <rect x="100" y="310" width="160" height="18" fill="#c8beb4"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-kitchen">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#ddd6cc"/>
                <rect y="360" width="800" height="240" fill="#b8aea4"/>
                <rect x="50" y="200" width="700" height="80" fill="#e8e0d4"/>
                <rect x="50" y="200" width="700" height="20" fill="#cec4b8"/>
                <rect x="300" y="230" width="80" height="50" rx="2" fill="#c4bab0"/>
                <rect x="450" y="220" width="120" height="60" fill="#b8b0a8"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-jacuzzi">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <defs><linearGradient id="jbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d8e8ec"/><stop offset="100%" stop-color="#a8c4cc"/></linearGradient></defs>
                <rect width="800" height="600" fill="#d0c8bc"/>
                <ellipse cx="400" cy="320" rx="200" ry="180" fill="url(#jbg)" stroke="#a8c0c8" stroke-width="3"/>
                <ellipse cx="400" cy="320" rx="160" ry="140" fill="rgba(180,210,220,0.5)"/>
                <rect y="450" width="800" height="150" fill="#b0a89e"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-garden">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8ede4"/><stop offset="100%" stop-color="#c8d4c0"/></linearGradient></defs>
                <rect width="800" height="600" fill="url(#sky)"/>
                <rect y="380" width="800" height="220" fill="#b8c4a8"/>
                <ellipse cx="200" cy="320" rx="80" ry="120" fill="#98a888"/>
                <ellipse cx="600" cy="300" rx="100" ry="140" fill="#8a9878"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-shower">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#dbd4ca"/>
                <rect y="335" width="800" height="265" fill="#b8aea2"/>
                <rect x="120" y="190" width="560" height="240" fill="#f5f0e9"/>
                <rect x="170" y="140" width="180" height="35" fill="#cac0b4"/>
                <circle cx="250" cy="310" r="18" fill="#d8cec2"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-bedroom1">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#d8cfc3"/>
                <rect y="355" width="800" height="245" fill="#b3a89c"/>
                <rect x="220" y="240" width="360" height="155" fill="#eee7dc"/>
                <rect x="245" y="200" width="310" height="60" fill="#c1b6a9"/>
                <rect x="270" y="265" width="115" height="52" fill="#f6f1ea"/>
                <rect x="415" y="265" width="115" height="52" fill="#f0e9df"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-bath1">
            <div class="scene-card"><div class="room-scene">
              <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="#dbd4ca"/>
                <rect y="335" width="800" height="265" fill="#b8aea2"/>
                <rect x="120" y="190" width="560" height="240" fill="#f5f0e9"/>
                <rect x="170" y="140" width="180" height="35" fill="#cac0b4"/>
                <rect x="470" y="135" width="115" height="140" fill="#a89f93"/>
                <circle cx="250" cy="310" r="18" fill="#d8cec2"/>
              </svg>
            </div></div>
          </div>

          <div class="room-visual" id="visual-bath2">
            <div class="room-image">
              <div class="room-scene">
                <div class="scene-card" style="display:flex;align-items:center;justify-content:center;">
                  <span style="font-family:'the-seasons',Georgia,serif;font-size:1.1rem;color:#5E5952;letter-spacing:0.08em;">Salle de bain</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /dark-block -->

    <div class="prereserver-wrap">
      <a class="prereserver-btn" href="#">Pré-réserver</a>
    </div>

  </div><!-- /page -->

  <script>
  const tip = document.getElementById('tip');
  document.addEventListener('mousemove', e => { tip.style.left=e.clientX+'px'; tip.style.top=e.clientY+'px'; });
  document.querySelectorAll('.pzone').forEach(z => {
    z.addEventListener('mouseenter', () => tip.classList.add('visible'));
    z.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });

  const roomImg = document.getElementById('roomImg');
  const visuals = document.querySelectorAll('.room-visual');

  function hideAllVisuals() { visuals.forEach(v => v.classList.remove('visible')); }
  function clearSelections() { document.querySelectorAll('.pzone').forEach(z => z.classList.remove('selected')); }

  function pick(id, zone) {
    clearSelections();
    zone.classList.add('selected');
    hideAllVisuals();
    const v = document.getElementById('visual-' + id);
    if (v) { roomImg.classList.remove('empty'); v.classList.add('visible'); }
  }

</script>


</body>
</html>
